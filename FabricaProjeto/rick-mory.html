<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rick & Morty Personagens</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
:root {
    --cor-fundo: #293531;
    --cor-card: #1c6b6e;
    --cor-texto: #e2e8f0;
    --cor-destaque: #22c55e;
    --cor-borda: #334155;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--cor-fundo);
    color: var(--cor-texto);
}

.topo {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 20px;
}

input {
    padding: 10px;
    width: 250px;
    border: 1px solid var(--cor-borda);
    border-radius: 6px;
    outline: none;
}

button {
    padding: 10px 14px;
    border: none;
    background: var(--cor-destaque);
    color: #000;
    border-radius: 6px;
    cursor: pointer;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    padding: 20px;
}

.card {
    background: var(--cor-card);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 4px;
    cursor: pointer;
}

.lista {
    padding: 20px;
}

.item-lista {
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--cor-borda);
    padding: 10px 0;
}

.item-lista img {
    width: 50px;
    height: 50px;
    border-radius: 6px;
    cursor: pointer;
}

.nome {
    font-weight: bold;
}

.planeta {
    font-size: 12px;
    opacity: 0.7;
}

.loading {
    text-align: center;
    margin-top: 40px;
    font-size: 18px;
}
</style>
</head>

<body>
<div id="app"></div>

<script type="text/babel">

const { useState, useEffect } = React;

function App() {
    const [personagens, setPersonagens] = useState([]);
    const [busca, setBusca] = useState("");
    const [modo, setModo] = useState("grid");
    const [carregando, setCarregando] = useState(false);
    const [modoBusca, setModoBusca] = useState(false); // 🔥 NOVO

    /* =========================
       FUNÇÕES DE LÓGICA
    ========================= */

    function carregarPersonagensIniciais() {
        setCarregando(true);

        fetch("https://rickandmortyapi.com/api/character")
            .then(res => res.json())
            .then(dados => {
                setPersonagens(dados.results || []);
                setCarregando(false);
            })
            .catch(() => {
                setPersonagens([]);
                setCarregando(false);
            });
    }

    function buscarPersonagens() {
        if (!busca) return;

        setCarregando(true);
        setModoBusca(true); // 🔥 ATIVA MODO BUSCA

        setTimeout(() => {
            fetch(`https://rickandmortyapi.com/api/character/?name=${busca}`)
                .then(res => res.json())
                .then(dados => {
                    setPersonagens(dados.results || []);
                    setCarregando(false);
                })
                .catch(() => {
                    setPersonagens([]);
                    setCarregando(false);
                });
        }, 2000);
    }

    function voltarInicio() {
        setBusca("");
        setModoBusca(false);
        carregarPersonagensIniciais();
    }

    function lidarEnter(evento) {
        if (evento.key === "Enter") {
            buscarPersonagens();
        }
    }

    function abrirPesquisa(nome) {
        const url = `https://www.google.com/search?q=como se chama esse personagem de rick e morty ${nome}`;
        window.open(url, "_blank");
    }

    function alternarModo() {
        setModo(modo === "grid" ? "lista" : "grid");
    }

    /* =========================
       FUNÇÕES DE RENDERIZAÇÃO
    ========================= */

    function renderizarTopo() {
        return (
            <div className="topo">
                <input
                    type="text"
                    placeholder="Pesquisa"
                    value={busca}
                    onChange={e => setBusca(e.target.value)}
                    onKeyDown={lidarEnter}
                />
                <button onClick={buscarPersonagens}>Pesquisar</button>
                <button onClick={alternarModo}>
                    {modo === "grid" ? "Modo Lista" : "Modo Grid"}
                </button>

                {/* 🔥 BOTÃO HOME */}
                {modoBusca && (
                    <button onClick={voltarInicio}>Home</button>
                )}
            </div>
        );
    }

    function renderizarLoading() {
        return <div className="loading">Carregando...</div>;
    }

    function renderizarGrid() {
        return (
            <div className="grid">
                {personagens.map(personagem => (
                    <div className="card" key={personagem.id}>
                        <img
                            src={personagem.image}
                            onClick={() => abrirPesquisa(personagem.name)}
                        />
                        <div>{personagem.name}</div>
                    </div>
                ))}
            </div>
        );
    }

    function renderizarLista() {
        return (
            <div className="lista">
                {personagens.map(personagem => (
                    <div className="item-lista" key={personagem.id}>
                        <img
                            src={personagem.image}
                            onClick={() => abrirPesquisa(personagem.name)}
                        />
                        <div>
                            <div className="nome">{personagem.name}</div>
                            <div className="planeta">
                                {personagem.origin?.name || "Desconhecido"}
                            </div>
                        </div>
                    </div>
                ))}
            </div>
        );
    }

    function renderizarConteudo() {
        if (carregando) return renderizarLoading();
        return modo === "grid" ? renderizarGrid() : renderizarLista();
    }

    /* =========================
       EFEITO INICIAL
    ========================= */

    useEffect(() => {
        carregarPersonagensIniciais();
    }, []);

    /* =========================
       RENDER FINAL
    ========================= */

    return (
        <div>
            {renderizarTopo()}
            {renderizarConteudo()}
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App />);

</script>
</body>
</html>
